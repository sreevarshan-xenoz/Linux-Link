[package]
name = "linux-link-core"
version.workspace = true
edition.workspace = true

[features]
default = ["wayland-portal", "x11-capture"]
wayland-portal = ["ashpd/screencast"]
x11-capture = ["xcap"]

[dependencies]
anyhow.workspace = true
serde.workspace = true
tokio.workspace = true
serde_json = "1"
tracing.workspace = true
uuid.workspace = true
async-trait.workspace = true

# Screen capture
ashpd.workspace = true
pipewire.workspace = true
libspa.workspace = true
tokio-util.workspace = true

# Video encoding
ffmpeg-sidecar.workspace = true

# Unix-specific utilities
libc.workspace = true

# QUIC streaming
quinn.workspace = true

# TLS and certificates for QUIC
rcgen.workspace = true
rustls.workspace = true

# X11 screen capture fallback (feature-gated)
xcap = { workspace = true, optional = true }

# Input injection via uinput (universal fallback)
evdev.workspace = true

# Directories / home paths
dirs.workspace = true
